---
# cPanel Git Version Control deployment manifest.
#
# This repo is checked out directly INTO the live theme folder, so the working
# tree IS the deployment target — no copy step is needed. cPanel requires this
# file to exist (and be valid YAML) to enable the "Deploy HEAD Commit" button.
#
# Reference: https://docs.cpanel.net/knowledge-base/web-services/git-deployment/

deployment:
  tasks:
    # Write a deploy timestamp so we can confirm deploys landed.
    - 'date -u "+%Y-%m-%dT%H:%M:%SZ" > $DEPLOYPATH/.deployed'
